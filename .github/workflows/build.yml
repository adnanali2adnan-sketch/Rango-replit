name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - name: Extract & Build
        run: |
          unzip RangoCompanion-source.zip
          mkdir -p android-rango/gradle/wrapper
          curl -sL "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar" -o android-rango/gradle/wrapper/gradle-wrapper.jar
          chmod +x android-rango/gradlew
          cd android-rango && ./gradlew assembleDebug --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: RangoCompanion-APK
          path: android-rango/app/build/outputs/apk/debug/app-debug.apk
